<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bundle Size Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 6px;
      border-left: 4px solid #007bff;
    }

    .summary-card.warning {
      border-left-color: #ffc107;
      background: #fff9e6;
    }

    .summary-card.error {
      border-left-color: #dc3545;
      background: #ffe6e6;
    }

    .summary-card h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }

    .chart-container {
      margin-bottom: 30px;
    }

    .chart-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #333;
    }

    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bar-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-label {
      width: 200px;
      font-size: 12px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-wrapper {
      flex: 1;
      background: #e9ecef;
      border-radius: 4px;
      height: 24px;
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #007bff, #0056b3);
      border-radius: 4px;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
    }

    .bar-fill.warning {
      background: linear-gradient(90deg, #ffc107, #ff9800);
    }

    .bar-fill.error {
      background: linear-gradient(90deg, #dc3545, #c82333);
    }

    .bar-value {
      font-size: 11px;
      color: white;
      font-weight: 600;
      white-space: nowrap;
    }

    .warnings {
      background: #fff9e6;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .warnings h3 {
      color: #856404;
      margin-bottom: 10px;
    }

    .warning-item {
      padding: 8px 0;
      border-bottom: 1px solid #ffe69c;
      color: #856404;
    }

    .warning-item:last-child {
      border-bottom: none;
    }

    .success {
      background: #d4edda;
      border: 1px solid #28a745;
      border-radius: 6px;
      padding: 20px;
      color: #155724;
      margin-bottom: 20px;
    }

    .file-input {
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 6px;
      border: 2px dashed #dee2e6;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .file-input:hover {
      border-color: #007bff;
      background: #e7f3ff;
    }

    .file-input input {
      display: none;
    }

    .file-input label {
      cursor: pointer;
      color: #007bff;
      font-weight: 600;
    }

    .timestamp {
      color: #999;
      font-size: 12px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bundle Size Visualization</h1>
    <p class="subtitle">Interactive visualization of Next.js bundle analysis</p>

    <div class="file-input" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".json" onchange="loadReport(event)">
      <label>📁 Click to load bundle-report.json</label>
      <p style="margin-top: 8px; color: #666; font-size: 14px;">
        File location: <code>frontend/.next/bundle-report.json</code>
      </p>
    </div>

    <div id="content" style="display: none;">
      <div class="summary" id="summary"></div>
      <div id="warnings"></div>
      <div class="chart-container">
        <div class="chart-title">Top 15 Largest Chunks</div>
        <div class="bar-chart" id="barChart"></div>
      </div>
      <div class="timestamp" id="timestamp"></div>
    </div>
  </div>

  <script>
    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }

    function loadReport(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          renderVisualization(data);
        } catch (error) {
          alert('Error parsing JSON file: ' + error.message);
        }
      };
      reader.readAsText(file);
    }

    function renderVisualization(data) {
      document.getElementById('content').style.display = 'block';

      // Thresholds
      const THRESHOLDS = {
        mainBundle: 500 * 1024,
        totalJS: 2 * 1024 * 1024,
        individualChunk: 200 * 1024,
      };

      // Summary cards
      const summaryHTML = `
        <div class="summary-card ${data.totalJS > THRESHOLDS.totalJS ? 'error' : ''}">
          <h3>Total JS Size</h3>
          <div class="value">${formatBytes(data.totalJS)}</div>
        </div>
        <div class="summary-card ${data.mainBundle > THRESHOLDS.mainBundle ? 'warning' : ''}">
          <h3>Main Bundle</h3>
          <div class="value">${formatBytes(data.mainBundle)}</div>
        </div>
        <div class="summary-card">
          <h3>Total Chunks</h3>
          <div class="value">${data.chunks.length}</div>
        </div>
        <div class="summary-card ${data.warnings.length > 0 ? 'warning' : ''}">
          <h3>Warnings</h3>
          <div class="value">${data.warnings.length}</div>
        </div>
      `;
      document.getElementById('summary').innerHTML = summaryHTML;

      // Warnings
      const warningsDiv = document.getElementById('warnings');
      if (data.warnings.length > 0) {
        const warningsHTML = `
          <div class="warnings">
            <h3>⚠️ Warnings (${data.warnings.length})</h3>
            ${data.warnings.map(w => `
              <div class="warning-item">
                <strong>${w.file}</strong>: ${formatBytes(w.size)} 
                (threshold: ${formatBytes(w.threshold)})
              </div>
            `).join('')}
          </div>
        `;
        warningsDiv.innerHTML = warningsHTML;
      } else {
        warningsDiv.innerHTML = `
          <div class="success">
            ✓ All bundles are within size thresholds!
          </div>
        `;
      }

      // Bar chart
      const maxSize = Math.max(...data.chunks.map(c => c.size));
      const top15 = data.chunks.slice(0, 15);
      
      const barChartHTML = top15.map(chunk => {
        const percentage = (chunk.size / maxSize) * 100;
        const isWarning = chunk.size > THRESHOLDS.individualChunk;
        const barClass = isWarning ? 'warning' : '';
        
        return `
          <div class="bar-item">
            <div class="bar-label" title="${chunk.name}">${chunk.name}</div>
            <div class="bar-wrapper">
              <div class="bar-fill ${barClass}" style="width: ${percentage}%">
                <span class="bar-value">${chunk.sizeFormatted}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById('barChart').innerHTML = barChartHTML;

      // Timestamp
      const timestamp = new Date(data.timestamp).toLocaleString();
      document.getElementById('timestamp').innerHTML = `Report generated: ${timestamp}`;
    }

    // Auto-load if running from file:// protocol with report in same directory
    window.addEventListener('DOMContentLoaded', () => {
      // Check if we can auto-load (this won't work in most browsers due to security)
      console.log('To visualize your bundle, click the file input above and select:');
      console.log('frontend/.next/bundle-report.json');
    });
  </script>
</body>
</html>
